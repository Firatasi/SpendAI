<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SpendAI - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" style="max-width: 900px;">
        <h1>Admin Paneli</h1>
        <h3>Kullanıcı Listesi</h3>
        <table id="userTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Kullanıcı Adı</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>İşlemler</th>
                </tr>
            </thead>
            <tbody id="userList">
                </tbody>
        </table>
        <br>
        <button onclick="logout()">Çıkış Yap</button>
    </div>

    <script>
        window.onload = fetchUsers;

        async function fetchUsers() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'index.html';
                return;
            }

            try {
                const response = await fetch('http://localhost:8080/api/admin/users', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const users = await response.json();
                    const userList = document.getElementById('userList');
                    
                    userList.innerHTML = users.map(user => {
                        const userId = user.id || user.userId; 
                        
                        return `
                        <tr>
                            <td>${userId || '---'}</td>
                            <td>${user.username}</td>
                            <td>${user.email}</td>
                            <td>${user.role}</td>
                            <td>
                                <button class="delete-btn" onclick="deleteUser(${userId})">Sil</button>
                            </td>
                        </tr>
                        `;
                    }).join('');
                } else {
                    alert("Kullanıcılar yüklenemedi. Yetkiniz olmayabilir!");
                }
            } catch (err) {
                console.error("Hata:", err);
            }
        }

        async function deleteUser(userId) {
            if (!userId) {
                alert("Kullanıcı ID'si bulunamadı!");
                return;
            }

            if (!confirm('Bu kullanıcıyı silmek istediğinize emin misiniz?')) return;

            const token = localStorage.getItem('token');
            try {
                const response = await fetch(`http://localhost:8080/api/admin/delete/${userId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': 'Bearer ' + token,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.ok) {
                    alert("Kullanıcı başarıyla silindi!");
                    fetchUsers();
                } else {
                    alert("Silme işlemi başarısız! Yetkiniz olmayabilir veya kullanıcı bulunamadı.");
                }
            } catch (err) {
                console.error("Silme hatası:", err);
                alert("Sunucuya bağlanılamadı!");
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>

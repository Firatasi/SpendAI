<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendAI - Anasayfa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>SpendAI Paneli</h1>
            <button onclick="logout()" style="background-color: #ff4b2b; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; width: auto;">Çıkış Yap</button>
        </header>

        <hr>

        <div class="ai-section">
            <h3>🤖 Akıllı Harcama Girişi</h3>
            <p>Harcamanı doğal bir dille yaz, AI senin için kaydetsin:</p>
            <textarea id="aiInput" placeholder="Örn: Bugün Starbucks'tan 180 TL'ye kahve aldım..."></textarea>
            <button onclick="sendToAi()" id="aiBtn" style="background-color: #008CBA; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; width: auto;">Harcamayı Analiz Et ve Kaydet</button>
            <p id="loadingMsg" class="loading">Yapay zeka analiz ediyor, lütfen bekleyin...</p>
        </div>

        <div class="list-section">
            <h3>Geçmiş Harcamaların</h3>
            <table>
                <thead>
                    <tr>
                        <th>Tarih</th>
                        <th>Kategori</th>
                        <th>Açıklama</th>
                        <th>Miktar (TL)</th>
                    </tr>
                </thead>
                <tbody id="spendTableBody">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');

    if (!token || (role !== 'USER' && role !== 'ROLE_USER')) {
        alert("Bu sayfaya erişim yetkiniz yok! Lütfen giriş yapın.");
        window.location.href = 'index.html';
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'index.html';
    }

    async function sendToAi() {
        const message = document.getElementById('aiInput').value;
        const loadingMsg = document.getElementById('loadingMsg');
        const aiBtn = document.getElementById('aiBtn');

        if (!message.trim()) {
            alert("Lütfen bir harcama metni girin.");
            return;
        }

        loadingMsg.style.display = "block";
        aiBtn.disabled = true;

        try {
            const response = await fetch('http://localhost:8080/api/spends/ai-add', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token
                },
                body: JSON.stringify({ message: message })
            });

            if (response.ok) {
                const newSpend = await response.json();
                alert("Başarıyla kaydedildi: " + newSpend.category + " - " + newSpend.amount + " TL");
                document.getElementById('aiInput').value = '';
                await loadSpends(); // sayfayı komple yenilemek yerine tabloyu tekrar yükle
            } else {
                const errorText = await response.text();
                alert("Hata: " + errorText);
            }
        } catch (error) {
            console.error("Hata:", error);
            alert("Sunucuya bağlanılamadı.");
        } finally {
            loadingMsg.style.display = "none";
            aiBtn.disabled = false;
        }
    }

    async function loadSpends() {
        const spendTableBody = document.getElementById('spendTableBody');
        spendTableBody.innerHTML = '';

        try {
            const response = await fetch('http://localhost:8080/api/spends/getAllSpends', {
                method: 'GET',
                headers: {
                    'Authorization': 'Bearer ' + token
                }
            });

            if (!response.ok) {
                throw new Error("Harcamalar alınamadı. Status: " + response.status);
            }

            const spends = await response.json();
            console.log("Harcamalarım:", spends);

            if (!spends || spends.length === 0) {
                spendTableBody.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align:center;">Henüz harcama bulunmuyor.</td>
                    </tr>
                `;
                return;
            }

            spends.forEach(spend => {
                const row = document.createElement('tr');

                const formattedDate = spend.date
                    ? new Date(spend.date).toLocaleDateString('tr-TR')
                    : '-';

                row.innerHTML = `
                    <td>${formattedDate}</td>
                    <td>${spend.category ?? '-'}</td>
                    <td>${spend.description ?? '-'}</td>
                    <td>${spend.amount ?? '-'}</td>
                `;

                spendTableBody.appendChild(row);
            });

        } catch (error) {
            console.error("Harcamalar yüklenirken hata oluştu:", error);
            spendTableBody.innerHTML = `
                <tr>
                    <td colspan="4" style="text-align:center; color:red;">
                        Harcamalar yüklenemedi.
                    </td>
                </tr>
            `;
        }
    }

    // Sayfa açılınca harcamaları getir
    window.onload = function () {
        loadSpends();
    };
</script>
</body>
</html>
